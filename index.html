<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Collection Dream Tracklist Maker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="controls">

        <h1>Dream Tracklist Maker</h1>
        <p>Create your own version of <strong>The Legacy Collection</strong>.</p>

        <label>Your Name</label>
        <input type="text" id="name" maxlength="20" placeholder="Cass">

        <div id="trackInputs"></div>

        <button id="downloadBtn">
            Download Image
        </button>

    </div>

    <div class="preview">

        <canvas
            id="canvas"
            width="1080"
            height="1350">
        </canvas>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
